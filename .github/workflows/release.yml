name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release tag
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      app_version: ${{ steps.version.outputs.app_version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Validate tag source and signature
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "${TAG_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tags must be stable SemVer tags like v1.2.3."
            exit 1
          fi

          git fetch --force origin "refs/heads/master:refs/remotes/origin/master" "refs/tags/${TAG_NAME}:refs/tags/${TAG_NAME}"

          if [[ "$(git cat-file -t "refs/tags/${TAG_NAME}")" != "tag" ]]; then
            echo "::error::Release tags must be signed annotated tags. Create the tag with: git tag -s ${TAG_NAME} -m ${TAG_NAME}"
            exit 1
          fi

          tag_commit="$(git rev-list -n 1 "refs/tags/${TAG_NAME}")"
          if ! git merge-base --is-ancestor "${tag_commit}" refs/remotes/origin/master; then
            echo "::error::Release tag ${TAG_NAME} must point to a commit contained in master."
            exit 1
          fi

          node <<'NODE'
          const token = process.env.GITHUB_TOKEN;
          const tag = process.env.TAG_NAME;
          const [owner, repo] = process.env.GITHUB_REPOSITORY.split("/");

          async function request(path) {
            const response = await fetch(`https://api.github.com${path}`, {
              headers: {
                "Accept": "application/vnd.github+json",
                "Authorization": `Bearer ${token}`,
                "User-Agent": "worth-release-validation",
                "X-GitHub-Api-Version": "2022-11-28"
              }
            });

            if (!response.ok) {
              const body = await response.text();
              throw new Error(`GitHub API ${response.status} for ${path}: ${body}`);
            }

            return response.json();
          }

          const ref = await request(`/repos/${owner}/${repo}/git/ref/tags/${tag}`);
          if (ref.object.type !== "tag") {
            console.error(`::error::Release tag ${tag} must be an annotated tag.`);
            process.exit(1);
          }

          const tagObject = await request(`/repos/${owner}/${repo}/git/tags/${ref.object.sha}`);
          if (!tagObject.verification?.verified) {
            const reason = tagObject.verification?.reason ?? "unknown";
            console.error(`::error::Release tag ${tag} is not verified by GitHub (${reason}).`);
            process.exit(1);
          }

          for (let page = 1; ; page += 1) {
            const releases = await request(`/repos/${owner}/${repo}/releases?per_page=100&page=${page}`);
            const existing = releases.find((release) => release.tag_name === tag);

            if (existing != null) {
              if (!existing.draft) {
                console.error(`::error::A published release already exists for ${tag}.`);
                process.exit(1);
              }

              break;
            }

            if (releases.length < 100) break;
          }
          NODE

      - name: Validate source versions
        id: version
        env:
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail

          node <<'NODE'
          const fs = require("node:fs");

          const tagVersion = process.env.TAG_NAME.slice(1);
          const cargoToml = fs.readFileSync("src-tauri/Cargo.toml", "utf8");
          const cargoVersion = cargoToml.match(/^\[package\][\s\S]*?^version\s*=\s*"([^"]+)"/m)?.[1];
          const versions = [
            ["package.json", JSON.parse(fs.readFileSync("package.json", "utf8")).version],
            ["src-tauri/tauri.conf.json", JSON.parse(fs.readFileSync("src-tauri/tauri.conf.json", "utf8")).version],
            ["src-tauri/Cargo.toml", cargoVersion]
          ];

          let failed = false;
          for (const [file, version] of versions) {
            if (version !== tagVersion) {
              console.error(`::error file=${file}::Expected version ${tagVersion}, found ${version ?? "missing"}.`);
              failed = true;
            }
          }

          if (failed) process.exit(1);

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `app_version=${tagVersion}\n`);
          NODE

  publish-tauri:
    name: Build ${{ matrix.platform }} release
    needs: validate
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-2025
            args: -- --locked
          - platform: ubuntu-22.04
            args: -- --locked
          - platform: macos-26
            args: --target universal-apple-darwin -- --locked
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Setup Rust
        run: rustup toolchain install

      - name: Add macOS Rust targets
        if: matrix.platform == 'macos-26'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build and upload release
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          POSTHOG_PROJECT_ID: ${{ vars.POSTHOG_PROJECT_ID }}
          POSTHOG_PERSONAL_API_KEY: ${{ secrets.POSTHOG_PERSONAL_API_KEY }}
          POSTHOG_SOURCEMAPS: "true"
          APP_VERSION: ${{ needs.validate.outputs.app_version }}
        with:
          tauriScript: bun tauri
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseDraft: true
          prerelease: false
          generateReleaseNotes: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}
